<!-- ============================================================
     MODAL: CRIAR / EDITAR TAREFA
     Modo criar: exibido quando nenhuma tarefa é passada como @Input
     Modo editar: exibido com os dados da tarefa pré-preenchidos
============================================================ -->
<div class="modal-overlay"
     [ngClass]="{ 'fechando': estaFechando }"
     (click)="fecharModal()">

  <div class="modal-content"
       [ngClass]="{ 'fechando': estaFechando }"
       (click)="$event.stopPropagation()">

    <!-- Botão de fechar (canto superior direito) -->
    <button class="btn-fechar-topo" (click)="fecharModal()">&times;</button>

    <!-- Cabeçalho -->
    <div class="modal-header">
      <h2>{{ tarefa ? 'Atualizar Tarefa' : 'Criar Nova Tarefa' }}</h2>
    </div>

    <hr class="linha1" />

    <!-- Corpo: formulário -->
    <div class="modal-body">
      <form [formGroup]="formulario" (ngSubmit)="salvarTarefa()">
        <section class="info-bloco">
          <h4>📝 Informações</h4>

          <p>
            <label>Título</label>
            <input type="text"
                   formControlName="titulo"
                   placeholder="Digite o título da tarefa" />
          </p>

          <p>
            <label>Data de Vencimento</label>
            <input type="date"
                   formControlName="dataVencimento"
                   [min]="dataMinima" />
          </p>

          <p>
            <label>Hora de Vencimento</label>
            <input type="time"
                   formControlName="horaVencimento" />
          </p>

          <p>
            <label>Descrição</label>
            <textarea rows="3"
                      formControlName="descricao"
                      placeholder="Detalhes da tarefa (opcional)"></textarea>
          </p>

          <p>
            <label>Status</label>
            <select formControlName="statusExecucao">
              <option value="A Fazer">A Fazer</option>
              <option value="Em Andamento">Em Andamento</option>
              <option value="Concluído">Concluído</option>
            </select>
          </p>
        </section>
      </form>
    </div>

    <hr class="linha2" />

    <!-- Rodapé: ações -->
    <div class="modal-footer">
      <div class="botoes-esquerda">
        <button type="button" class="btn-excluir" (click)="cancelar()">
          Cancelar
        </button>
      </div>

      <div class="botoes-direita">
        <button type="submit"
                class="btn-editar"
                [disabled]="formulario.invalid"
                (click)="salvarTarefa()">
          {{ tarefa ? 'Atualizar' : 'Salvar' }}
        </button>
      </div>
    </div>

  </div>
</div>
